<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고용노동부 지정 안전보건전문기관 찾기 · ESH-MASTER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://dapi.kakao.com">
<link rel="preconnect" href="https://cdnjs.cloudflare.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --navy:#0A2540;--navy2:#1A3A66;
  --blue:#1E6BD8;--blue-lt:#E8F0FC;
  --mint:#14B8A6;--amber:#F59E0B;
  --ink:#0F172A;--g7:#334155;--g6:#475569;--g5:#64748B;
  --g4:#94A3B8;--g3:#CBD5E1;--g2:#E2E8F0;--g1:#F1F5F9;
  --line:#E5E9EF;--white:#fff;
  --sh-sm:0 1px 3px rgba(10,37,64,.06);
  --sh-md:0 4px 16px rgba(10,37,64,.09);
  --sh-lg:0 12px 32px rgba(10,37,64,.13);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Pretendard Variable',Pretendard,sans-serif;color:var(--ink);background:#F4F6FB;-webkit-font-smoothing:antialiased;overflow:hidden}
a{color:inherit;text-decoration:none}

/* ─ 헤더 ─ */
.hd{height:52px;background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:0 28px;flex-shrink:0;z-index:10}
.hd-logo{display:flex;align-items:center;gap:9px;color:#fff}
.hd-mark{width:30px;height:30px;background:#fff;color:var(--navy);display:grid;place-items:center;border-radius:7px;font-weight:800;font-size:11px;position:relative;flex-shrink:0}
.hd-mark::after{content:'';position:absolute;bottom:3px;right:3px;width:4px;height:4px;background:var(--mint);border-radius:50%}
.hd-name{font-size:15px;font-weight:800;letter-spacing:-.02em}
.hd-sub{font-size:9.5px;color:rgba(255,255,255,.4);letter-spacing:.08em;margin-top:1px}
.hd-title{font-size:15.5px;color:rgba(255,255,255,.85);font-weight:800;letter-spacing:-.02em}
.hd-back{display:flex;align-items:center;gap:5px;font-size:12px;color:rgba(255,255,255,.45);transition:color .2s}
.hd-back:hover{color:#fff}

/* ─ 전체 레이아웃 ─ */
.layout{display:flex;height:calc(100vh - 52px)}

/* ─ 사이드바 (트리 필터) ─ */
.sidebar{width:308px;flex-shrink:0;background:var(--white);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:18px 20px 14px;border-bottom:1px solid var(--g2)}
.sb-head h2{font-size:14px;font-weight:800;color:var(--navy);margin-bottom:4px}
.sb-head p{font-size:11.5px;color:var(--g5)}
.sb-body{flex:1;overflow-y:auto;padding:12px 0}
.sb-body::-webkit-scrollbar{width:4px}
.sb-body::-webkit-scrollbar-thumb{background:var(--g3);border-radius:4px}

/* 트리 아이템 */
.tree-section{margin-bottom:4px}
.tree-label{display:flex;align-items:center;gap:8px;padding:8px 20px;font-size:10.5px;font-weight:800;color:var(--g4);letter-spacing:.06em;text-transform:uppercase}
.tree-label svg{flex-shrink:0}

.tree-item{display:flex;align-items:center;gap:9px;padding:9px 20px 9px 32px;font-size:13px;font-weight:600;color:var(--g7);cursor:pointer;transition:all .15s;border-left:3px solid transparent;position:relative}
.tree-item:hover{background:var(--g1);color:var(--navy)}
.tree-item.active{background:var(--blue-lt);color:var(--blue);border-left-color:var(--blue);font-weight:700}
.tree-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;border:1.5px solid currentColor;transition:all .15s}
.tree-item.active .tree-dot{background:var(--blue);border-color:var(--blue)}
.tree-count{margin-left:auto;font-size:10px;font-weight:700;color:var(--g4);font-family:'Inter',sans-serif;background:var(--g1);padding:1px 6px;border-radius:10px}
.tree-item.active .tree-count{background:var(--blue-lt);color:var(--blue)}

/* 지역 토글 */
.region-toggle{display:flex;align-items:center;gap:9px;padding:9px 20px 9px 32px;font-size:13px;color:var(--g7);cursor:pointer;transition:all .15s;font-weight:600}
.region-toggle:hover{background:var(--g1)}
.region-toggle svg{transition:transform .2s;flex-shrink:0}
.region-toggle.open svg{transform:rotate(90deg)}
.region-sub{display:none;padding:4px 0}
.region-sub.open{display:block}
.region-sub-item{display:flex;align-items:center;gap:8px;padding:7px 20px 7px 48px;font-size:12.5px;font-weight:600;color:var(--g6);cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.region-sub-item:hover{background:var(--g1);color:var(--navy)}
.region-sub-item.active{background:var(--blue-lt);color:var(--blue);border-left-color:var(--blue);font-weight:700}

/* 검색 */
.sb-search{padding:12px 16px;border-top:1px solid var(--g2)}
.kw-row{display:flex;gap:6px}
.kw-wrap{flex:1;position:relative}
.kw-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--g4);pointer-events:none}
.kw-input{width:100%;border:1.5px solid var(--g2);border-radius:8px;padding:9px 10px 9px 32px;font-size:13px;font-family:inherit;outline:none;background:var(--g1);color:var(--ink);transition:border-color .2s}
.kw-input:focus{border-color:var(--blue);background:#fff}
.kw-input::placeholder{color:var(--g4)}
.go-btn{padding:9px 14px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s;white-space:nowrap}
.go-btn:hover{background:#2E7CE4}

/* ─ 결과 패널 ─ */
.result-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--g1);min-width:300px}
.resizer{width:6px;background:var(--line);cursor:col-resize;flex-shrink:0;position:relative;transition:background .2s;z-index:10}
.resizer:hover,.resizer.dragging{background:var(--blue)}
.resizer::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:2px;height:40px;background:var(--g3);border-radius:2px;transition:background .2s}
.resizer:hover::after,.resizer.dragging::after{background:#fff}
.rp-head{padding:14px 20px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;flex-shrink:0}
.rp-breadcrumb{display:flex;align-items:center;gap:6px;font-size:13.5px;color:var(--g5);flex:1;flex-wrap:wrap}
.rp-breadcrumb .bc-item{font-weight:700;color:var(--navy);font-size:13px}
.rp-breadcrumb .bc-sep{color:var(--g4)}
.rp-count{font-size:16px;font-weight:900;color:var(--navy);white-space:nowrap}
.sort-sel{font-size:12px;border:1px solid var(--line);border-radius:7px;padding:5px 10px;color:var(--g6);cursor:pointer;font-family:inherit;outline:none;background:#fff}

.rp-body{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px}
.rp-body::-webkit-scrollbar{width:4px}
.rp-body::-webkit-scrollbar-thumb{background:var(--g3);border-radius:4px}

/* 기관 카드 */
.agency-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .18s}
.agency-card:hover{border-color:var(--blue);box-shadow:var(--sh-md);transform:translateX(2px)}
.agency-card.active{border-color:var(--blue);background:var(--blue-lt);box-shadow:var(--sh-md)}
.ac-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.ac-name{font-size:15px;font-weight:900;color:var(--navy);line-height:1.3}
.ac-grade{width:24px;height:24px;border-radius:6px;display:grid;place-items:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}
.ac-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px}
.ac-tag{font-size:10.5px;padding:2px 7px;border-radius:20px;font-weight:600;background:var(--g1);color:var(--g7)}
.ac-addr{font-size:12px;font-weight:600;color:var(--g5);line-height:1.5}
.ac-tel{font-size:13px;color:var(--blue);font-weight:800;margin-top:3px;font-family:'Inter',sans-serif;display:block;text-decoration:none}.ac-tel:hover{text-decoration:underline}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--g4)}
.empty-icon{font-size:40px;opacity:.4}
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--g4);font-size:13px}
.loading-spinner{width:28px;height:28px;border-radius:50%;border:3px solid var(--g2);border-top-color:var(--blue);animation:spin .8s linear infinite}

/* ─ 지도 패널 ─ */
.map-panel{width:620px;flex-shrink:0;border-left:none;min-width:280px}
#map{width:100%;height:100%}

/* 반응형 */
@media(max-width:1400px){.map-panel{width:480px}}@media(max-width:1100px){.map-panel{width:360px}}
@media(max-width:900px){.map-panel{display:none}}
@media(max-width:680px){
  .sidebar{width:220px}
  body{overflow:auto}
  .layout{flex-direction:column;height:auto}
  .result-panel{min-height:60vh}
  .map-panel{display:none}
}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .25s ease-out both}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="hd">
  <a href="index.html" class="hd-logo">
    <div class="hd-mark">EM</div>
    <div><div class="hd-name">ESH-MASTER</div><div class="hd-sub">ENVIRONMENT · SAFETY · HEALTH</div></div>
  </a>
  <div class="hd-title">고용노동부 지정 안전보건전문기관 찾기</div>
  <a href="index.html" class="hd-back">

  </a>
</div>

<!-- 레이아웃 -->
<div class="layout">

  <!-- 사이드바 -->
  <div class="sidebar">
    <div class="sb-head">
      <h2>🔎 기관 검색</h2>
      <p>분야 · 지역 선택 후 결과를 확인하세요</p>

      <div class="tree-section">
        <div class="tree-label">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 2l8 4v6c0 5-3.5 9.4-8 10-4.5-.6-8-5-8-10V6l8-4z"/></svg>

      <!-- 지역 -->
      <div class="tree-section" id="region-section" style="display:none">
        <div class="tree-label">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>

          </div>
          <div class="region-sub-item" data-region="서울" onclick="selectRegion(this)"><svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="12"/></svg>서울</div>
          <div class="region-sub-item" data-region="경기" onclick="selectRegion(this)"><svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="12"/></svg>경기</div>
          <div class="region-sub-item" data-region="인천" onclick="selectRegion(this)"><svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="12"/></svg>인천</div>
          <div class="region-sub-item" data-region="강원" onclick="selectRegion(this)"><svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="12"/></svg>강원</div>
          <div class="region-sub-item" data-region="충북" onclick="selectRegion(this)"><svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="12"/></svg>충북</div>
          <div class="region-sub-item" data-region="충남" onclick="selectRegion(this)"><svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="12"/></svg>충남</div>
          <div class="region-sub-item" data-region="대전" onclick="selectRegion(this)"><svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="12"/></svg>대전</div>
          <div class="region-sub-item" data-region="세종" onclick="selectRegion(this)"><svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="12"/></svg>세종</div>
          <div class="region-sub-item" data-region="부산" onclick="selectRegion(this)"><svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="12"/></svg>부산</div>
          <div class="region-sub-item" data-region="울산" onclick="selectRegion(this)"><svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="12"/></svg>울산</div>
          <div class="region-sub-item" data-region="경남" onclick="selectRegion(this)"><svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="12"/></svg>경남</div>
          <div class="region-sub-item" data-region="대구" onclick="selectRegion(this)"><svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="12"/></svg>대구</div>
          <div class="region-sub-item" data-region="경북" onclick="selectRegion(this)"><svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="12"/></svg>경북</div>
          <div class="region-sub-item" data-region="광주" onclick="selectRegion(this)"><svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="12"/></svg>광주</div>
          <div class="region-sub-item" data-region="전북" onclick="selectRegion(this)"><svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="12"/></svg>전북</div>
          <div class="region-sub-item" data-region="전남" onclick="selectRegion(this)"><svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="12"/></svg>전남</div>
          <div class="region-sub-item" data-region="제주" onclick="selectRegion(this)"><svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="12"/></svg>제주</div>
        </div>
      </div>
    </div>

    <!-- 키워드 검색 -->
    <div class="sb-search">
      <div class="kw-row">
        <div class="kw-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input class="kw-input" type="text" id="kw-input" placeholder="기관명 검색 (선택)" autocomplete="off">

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbykCxcVBZki0-wrNpd5a63D_wttCJUs14_-OyvrEGcozwueS3BMnlRxNALz_KijeyTO/exec';

const TYPES = [
  { key:'건설재해예방', label:'건설재해예방전문지도기관', icon:'🏗️', color:'#1E6BD8', date:"2026년 3월 기준" },
  { key:'안전관리',    label:'안전관리전문기관',          icon:'🛡️', color:'#0E7A6E', date:"2026년 3월 기준" },
  { key:'보건관리',    label:'보건관리전문기관',          icon:'🩺', color:'#7C3AED', date:"2026년 4월 기준" },
  { key:'특수건강진단', label:'특수건강진단실시기관',     icon:'🏥', color:'#D97706', date:"2026년 3월 기준" },
  { key:'자율안전검사', label:'자율안전검사기관',         icon:'🔍', color:'#DC2626', date:"2025년 12월 기준" },
  { key:'석면조사',    label:'석면조사기관',              icon:'🔬', color:'#475569', date:"2025년 11월 기준" },
  { key:'작업환경측정', label:'작업환경측정기관',         icon:'📊', color:'#0891B2', date:"2025년 10월 기준" },
  { key:'안전보건진단', label:'안전보건진단기관',         icon:'📋', color:'#6D28D9', date:"2026년 2월 기준" },
];
const GRADE_COLOR = {S:'#0E7A6E',A:'#1E6BD8',B:'#7C3AED',C:'#D97706',D:'#DC2626','-':'#94A3B8'};

let currentType = '', currentRegion = '', allData = [], kakaoMap = null, markers = [];

// ── 초기화
window.addEventListener('DOMContentLoaded', () => {
  loadAgencyOrder().then(() => buildTypeList());
  document.getElementById('search-btn').addEventListener('click', doSearch);
  document.getElementById('kw-input').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });
  document.getElementById('sort-select').addEventListener('change', renderList);
  initKakaoMap();
});

// ── 분야 목록 생성
async function loadAgencyOrder() {
  try {
    const d = await (await fetch(API_URL + '?action=getConfig', {cache:'force-cache', signal:AbortSignal.timeout(5000)})).json();
    if (d.success && d.config?.agencyOrder) {
      const order = d.config.agencyOrder;
      TYPES.sort((a, b) => {
        const ai = order.indexOf(a.key), bi = order.indexOf(b.key);
        return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
      });
    }
  } catch {}
}

function buildTypeList() {
  const list = document.getElementById('type-list');
  list.innerHTML = TYPES.map(t => `
    <div class="tree-item" data-key="${t.key}" onclick="selectType('${t.key}')">
      <span class="tree-dot" style="border-color:${t.color}"></span>
      <span>${t.icon} ${t.label}</span>
      <span class="tree-count" id="cnt-${t.key}">—</span>
    </div>
  `).join('');
  loadCounts();
}

async function loadCounts() {
  try {
    const d = await (await fetch(API_URL + '?action=types', {signal:AbortSignal.timeout(8000), cache:'force-cache'})).json();
    if (!d.success) return;
    d.types.forEach(t => {
      const el = document.getElementById('cnt-'+t.key);
      if (el) el.textContent = t.count;
    });
  } catch {}
}

// ── 분야 선택
function selectType(key) {
  currentType = key;
  currentRegion = '';

  // 사이드바 활성화
  document.querySelectorAll('.tree-item').forEach(i => i.classList.remove('active'));
  document.querySelector(`[data-key="${key}"]`).classList.add('active');

  // 지역 섹션 표시 + 초기화
  document.getElementById('region-section').style.display = 'block';
  document.querySelectorAll('.region-sub-item').forEach(i => i.classList.remove('active'));
  document.querySelector('[data-region=""]').classList.add('active');

  doSearch();
}

// ── 지역 선택
function selectRegion(el) {
  document.querySelectorAll('.region-sub-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  currentRegion = el.dataset.region;
  doSearch();
}

// ── 검색
async function doSearch() {
  if (!currentType) return;
  showLoading();

  const keyword = document.getElementById('kw-input').value.trim();
  try {
    const qs = new URLSearchParams({
      action:'search', type:currentType,
      region:currentRegion, keyword, limit:'300',
    });
    const d = await (await fetch(API_URL+'?'+qs, {signal:AbortSignal.timeout(12000), cache:'no-store'})).json();
    if (!d.success) throw new Error(d.message);
    allData = d.data || [];
    renderAll();
  } catch {
    document.getElementById('rp-body').innerHTML =
      '<div class="empty-state"><div class="empty-icon">⚠️</div><div>데이터를 불러올 수 없습니다.</div></div>';
  }
}

// ── 렌더링
function renderAll() {
  renderBreadcrumb();
  renderList();
  renderMarkers(window._sorted || allData);
  document.getElementById('sort-select').style.display = '';
  document.getElementById('rp-count').style.display = '';
}

function renderBreadcrumb() {
  const type = TYPES.find(t => t.key === currentType);
  const bc   = document.getElementById('breadcrumb');
  let h = `<span class="bc-item">${type?.icon||''} ${type?.label||''}</span>`;
  if (currentRegion) h += `<span class="bc-sep">›</span><span class="bc-item">📍 ${currentRegion}</span>`;
  if (type?.date) h += `<span style="margin-left:auto;font-size:11px;color:var(--g4);font-weight:500">고용노동부 공표, ${type.date}</span>`;
  bc.innerHTML = h;
}

function renderList() {
  const sort = document.getElementById('sort-select').value;
  const s = [...allData].sort((a,b) => {
    if (sort==='grade'){const o={S:0,A:1,B:2,C:3,D:4,'-':5};return(o[a.등급]??5)-(o[b.등급]??5);}
    if (sort==='region') return (a.지역||'').localeCompare(b.지역||'');
    return (a.기관명||'').localeCompare(b.기관명||'');
  });
  window._sorted = s;

  document.getElementById('rp-count').textContent = s.length + '개';

  if (!s.length) {
    document.getElementById('rp-body').innerHTML =
      '<div class="empty-state"><div class="empty-icon">🔍</div><div>검색 결과가 없습니다.</div></div>';
    return;
  }

  document.getElementById('rp-body').innerHTML = s.map((a,i) => {
    const gc = GRADE_COLOR[a.등급] || GRADE_COLOR['-'];
    return `<div class="agency-card fade-up" id="card-${i}" onclick="onCard(${i})" style="animation-delay:${Math.min(i*15,400)}ms">
      <div class="ac-top">
        <div class="ac-name">${a.기관명}</div>
        <div class="ac-grade" style="background:${gc}">${a.등급||'-'}</div>
      </div>
      <div class="ac-meta">
        ${a.지역?`<span class="ac-tag">📍 ${a.지역}</span>`:''}
        ${a.지정관서?`<span class="ac-tag">${a.지정관서}</span>`:''}
        ${a.구분&&a.구분!==a.label?`<span class="ac-tag">${a.구분}</span>`:''}
      </div>
      <div class="ac-addr">${a.주소||''}</div>
      ${a.전화번호?`<a class="ac-tel" href="tel:${a.전화번호.replace(/[^0-9]/g,'')}">📞 ${a.전화번호}</a>`:''}
    </div>`;
  }).join('');
}

function showLoading() {
  document.getElementById('rp-body').innerHTML =
    '<div class="loading-wrap"><div class="loading-spinner"></div>불러오는 중...</div>';
  document.getElementById('rp-count').style.display = 'none';
}

// ── 카카오 지도
function initKakaoMap() {
  if (typeof kakao === 'undefined') {
    setTimeout(initKakaoMap, 300);
    return;
  }
  kakaoMap = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(36.5, 127.8),
    level: 8,
  });
  kakaoMap.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);
}

function renderMarkers(agencies) {
  if (!kakaoMap) return;
  markers.forEach(m => { m.marker.setMap(null); m.info?.close(); });
  markers = [];
  const bounds = new kakao.maps.LatLngBounds();
  let hasCoords = false;

  agencies.forEach((a, i) => {
    if (!a.lat || !a.lng) return;
    const gc  = GRADE_COLOR[a.등급] || GRADE_COLOR['-'];
    const pos = new kakao.maps.LatLng(a.lat, a.lng);
    bounds.extend(pos);
    hasCoords = true;

    const markerImg = new kakao.maps.MarkerImage(
      'data:image/svg+xml;utf8,' + encodeURIComponent(
        `<svg width="30" height="30" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">
          <circle cx="15" cy="15" r="15" fill="${gc}"/>
          <circle cx="15" cy="15" r="12" fill="none" stroke="white" stroke-width="2"/>
          <text x="15" y="19" text-anchor="middle" fill="white" font-size="10" font-weight="800" font-family="sans-serif">${a.등급||'?'}</text>
        </svg>`
      ),
      new kakao.maps.Size(30, 30),
      { offset: new kakao.maps.Point(15, 15) }
    );

    const m = new kakao.maps.Marker({ position: pos, map: kakaoMap, image: markerImg });
    const info = new kakao.maps.InfoWindow({
      content: `<div style="padding:12px 14px;font-family:Pretendard,sans-serif;min-width:190px;max-width:240px;line-height:1.5">
        <b style="font-size:13px;color:#0A2540;display:block;margin-bottom:4px">${a.기관명}</b>
        <div style="font-size:11.5px;color:#64748B;margin-bottom:5px">${a.주소||''}</div>
        ${a.전화번호?`<a href="tel:${a.전화번호.replace(/[^0-9]/g,'')}" style="font-size:12px;color:#1E6BD8;font-weight:700;display:block;margin-bottom:5px;text-decoration:none">📞 ${a.전화번호}</a>`:''}
        <span style="background:${gc};color:#fff;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700">${a.등급||'-'}등급</span>
        ${a.지역?`<span style="background:#F1F5F9;color:#475569;padding:2px 7px;border-radius:20px;font-size:10px;margin-left:4px">${a.지역}</span>`:''}
      </div>`,
      removable: true,
    });

    kakao.maps.event.addListener(m, 'click', () => {
      markers.forEach(({info:inf}) => inf?.close());
      info.open(kakaoMap, m);
      const el = document.getElementById('card-'+i);
      if (el) { el.scrollIntoView({behavior:'smooth',block:'nearest'}); highlightCard(i); }
    });

    markers.push({ marker: m, info });
  });

  if (hasCoords && agencies.length > 1) kakaoMap.setBounds(bounds);
  else if (hasCoords) { kakaoMap.setCenter(new kakao.maps.LatLng(agencies[0].lat, agencies[0].lng)); kakaoMap.setLevel(5); }
}

function onCard(idx) {
  const a = (window._sorted||[])[idx];
  if (!a?.lat || !a?.lng || !kakaoMap) return;
  highlightCard(idx);
  kakaoMap.setCenter(new kakao.maps.LatLng(a.lat, a.lng));
  kakaoMap.setLevel(5);
  markers.forEach(({info}) => info?.close());
  markers[idx]?.info?.open(kakaoMap, markers[idx]?.marker);
}


function highlightCard(idx) {
  document.querySelectorAll('.agency-card').forEach(c => c.classList.remove('active'));
  document.getElementById('card-'+idx)?.classList.add('active');
}


  // ── 패널 리사이저
  (function() {
    const resizer = document.getElementById('resizer');
    const resultPanel = document.querySelector('.result-panel');
    const mapPanel = document.getElementById('map-panel');
    const layout = document.querySelector('.layout');
    let isResizing = false, startX = 0, startMapW = 0;

    resizer.addEventListener('mousedown', e => {
      isResizing = true;
      startX = e.clientX;
      startMapW = mapPanel.offsetWidth;
      resizer.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
    });

    document.addEventListener('mousemove', e => {
      if (!isResizing) return;
      const diff = startX - e.clientX;
      const newW = Math.max(280, Math.min(startMapW + diff, layout.offsetWidth - 500));
      mapPanel.style.width = newW + 'px';
    });

    document.addEventListener('mouseup', () => {
      if (!isResizing) return;
      isResizing = false;
      resizer.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      // 카카오 지도 리사이즈
      if (window.kakaoMap) kakao.maps.event.trigger(kakaoMap, 'resize');
    });

    // 터치 지원
    resizer.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startMapW = mapPanel.offsetWidth;
      isResizing = true;
    }, { passive: true });
    document.addEventListener('touchmove', e => {
      if (!isResizing) return;
      const diff = startX - e.touches[0].clientX;
      const newW = Math.max(280, Math.min(startMapW + diff, layout.offsetWidth - 500));
      mapPanel.style.width = newW + 'px';
    }, { passive: true });
    document.addEventListener('touchend', () => { isResizing = false; });
  })();

  // ── 보안: 우클릭 / 개발자도구 제한
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('keydown', e => {
    if (e.key === 'F12') { e.preventDefault(); return false; }
    if (e.ctrlKey && e.shiftKey && ['I','J','C','U'].includes(e.key.toUpperCase())) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.key.toUpperCase() === 'U') { e.preventDefault(); return false; }
    if (e.ctrlKey && e.key.toUpperCase() === 'S') { e.preventDefault(); return false; }
  });
  // 개발자도구 감지
  (function devDetect() {
    const t = new Image();
    Object.defineProperty(t, 'id', { get: function() {
      document.body.innerHTML = '<div style="display:grid;place-items:center;height:100vh;font-family:sans-serif;color:#64748B"><div style="text-align:center"><div style="font-size:48px;margin-bottom:16px">🔒</div><div style="font-size:18px;font-weight:700;color:#0A2540">접근이 제한되었습니다</div></div></div>';
    }});
    setInterval(() => { console.log('%c', t); console.clear(); }, 1000);
  })();
</script>
